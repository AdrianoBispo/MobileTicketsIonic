<ion-header class="header">
  <ion-title>
    SOLICITAR SENHA
  </ion-title>
</ion-header>

<ion-content class="background">

  <ion-segment class="conteudo">
    <ion-button class="button" id="geral" shape="round" (click)="senhas.novaSenha('SG')">
      <ion-icon name="apps"></ion-icon>
      Geral
    </ion-button>
    
    <ion-button class="button" id="exame" shape="round" (click)="senhas.novaSenha('SE')">
      <ion-icon name="document"></ion-icon>
      Retirada de Exames
    </ion-button>
    
    <ion-button class="button" id="prioritaria" shape="round" (click)="senhas.novaSenha('SP')">
      <ion-icon name="alert"></ion-icon>
      Prioritária
    </ion-button>
  </ion-segment>

  <ion-segment class="chamadas">
    SENHAS CHAMADAS
  </ion-segment>
  <section class="senhas-chamadas">
    <ion-card *ngFor="let senha of senhas.senhasAtendidas" class="card-de-senha">
      <div [class]="senha.tipo"> </div>
      <ion-card-content>
        {{senha.numero}}
      </ion-card-content>
    </ion-card>
  </section>
</ion-content>
